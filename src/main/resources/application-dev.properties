spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/maamacrea}
spring.datasource.username=${DB_USERNAME:maamacrea_user}
spring.datasource.password=${DB_PASSWORD:maamacrea_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=3

spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=100MB
app.insumos.documentos.upload-dir=uploads/comprobantes-insumos
app.ventas.imagenes.upload-dir=uploads/ventas/disenos
app.ventas.archivos.upload-dir=uploads/ventas
app.ventas.archivos.max-por-venta=10
app.ventas.archivos.max-size-mb=10
app.ventas.images.max-count=10
app.ventas.images.max-original-size-mb=30
app.ventas.images.max-optimized-size-mb=2
app.ventas.images.max-dimension=1600
app.ventas.images.thumbnail-dimension=400
app.ventas.images.quality=0.82
app.ventas.images.max-pixels=40000000
